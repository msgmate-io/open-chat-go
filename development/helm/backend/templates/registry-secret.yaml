{{- if .Values.registryAuth.use }}
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: {{ .Values.registryAuth.secretName }}
  namespace: {{ .Values.rootNamespace }}
stringData:
  .dockerconfigjson: >
    {{
      (
        dict "auths"
        (
          dict .Values.registryAuth.host
          (
            dict "auth" .Values.registryAuth.token
          )
        )
      )
      | toJson
    }}
{{- end }}
