apiVersion: v1
kind: Secret
metadata:
  name: backend-env
  namespace: {{ .Values.rootNamespace }}
type: Opaque
data:
{{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | toString | b64enc | quote }}
{{- end }}
{{- if not (hasKey .Values.backend.env "DB_BACKEND") }}
  DB_BACKEND: {{ "sqlite" | b64enc | quote }}
{{- end }}
{{- if not (hasKey .Values.backend.env "DB_PATH") }}
  {{- if .Values.backend.sqlite.persistence.enabled }}
  DB_PATH: {{ printf "%s/%s" .Values.backend.sqlite.persistence.mountPath .Values.backend.sqlite.persistence.fileName | b64enc | quote }}
  {{- else }}
  DB_PATH: {{ .Values.backend.sqlite.path | toString | b64enc | quote }}
  {{- end }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-container
  namespace: {{ .Values.rootNamespace }}
  labels:
    app: backend-container
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend-container
  template:
    metadata:
      labels:
        app: backend-container
    spec:
      containers:
        - name: backend-container
          image: {{ .Values.backend.imageURL }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          envFrom:
            - secretRef:
                name: backend-env
          {{- if .Values.backend.sqlite.persistence.enabled }}
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.backend.sqlite.persistence.mountPath }}
          {{- end }}
      {{- if .Values.backend.sqlite.persistence.enabled }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Values.backend.sqlite.persistence.existingClaim | default "backend-sqlite-data" }}
      {{- end }}
      {{- if .Values.registryAuth.use }}
      imagePullSecrets:
        - name: {{ .Values.registryAuth.secretName }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: {{ .Values.rootNamespace }}
  labels:
    app: backend-container
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
  selector:
    app: backend-container
