{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-env
  namespace: {{ .Values.rootNamespace }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgres.auth.username | toString | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | toString | b64enc | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | toString | b64enc | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: {{ .Values.rootNamespace }}
  labels:
    app: postgres-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-deployment
  template:
    metadata:
      labels:
        app: postgres-deployment
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.postgres.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.postgres.service.port }}
          envFrom:
            - secretRef:
                name: postgres-env
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: {{ .Values.postgres.persistence.mountPath }}
          {{- end }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ .Values.postgres.persistence.existingClaim | default "postgres-data" }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.service.name }}
  namespace: {{ .Values.rootNamespace }}
  labels:
    app: postgres-deployment
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
  selector:
    app: postgres-deployment
{{- end }}
