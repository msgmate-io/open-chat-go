name: Tag Python Client Release

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: Release type (pr-alpha, staging, production)
        required: false
        default: pr-alpha
      source_repository:
        description: Source repository containing version file
        required: false
        default: msgmate-io/open-chat-go
      source_pr_number:
        description: Source pull request number for comment context
        required: false
        default: ""
      source_target_ref:
        description: Source target ref/SHA used for version + commit suffix
        required: false
        default: main
      source_branch:
        description: Source branch name used for latest alias tag
        required: false
        default: ""
      client_repository:
        description: Python client repository to tag
        required: false
        default: msgmate-io/open-chat-go-python-client
      bot_user:
        description: GitHub username that owns bot comments
        required: false
        default: cur1ousdude

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tag-python-client:
    name: Create Python Client Tag
    runs-on: ubuntu-latest
    env:
      API_TOKEN: ${{ secrets.BOT_TOKEN || github.token }}
    steps:
      - name: Resolve source version and commit metadata
        id: meta
        env:
          SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
          SOURCE_TARGET_REF: ${{ github.event.inputs.source_target_ref }}
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
          RELEASE_KIND: ${{ github.event.inputs.release_kind }}
        run: |
          set -euo pipefail

          commit_json="$(curl -fsSL \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${SOURCE_REPOSITORY}/commits/${SOURCE_TARGET_REF}")"
          SOURCE_SHA="$(jq -r '.sha' <<< "$commit_json")"
          SHORT_SHA="$(printf '%s' "$SOURCE_SHA" | cut -c1-12)"

          content_json="$(curl -fsSL \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${SOURCE_REPOSITORY}/contents/backend/api/metrics/handler.go?ref=${SOURCE_TARGET_REF}")"
          VERSION_FILE="$(jq -r '.content' <<< "$content_json" | tr -d '\n' | base64 -d)"
          VERSION="$(printf '%s' "$VERSION_FILE" | sed -n 's/.*var VERSION = "\(.*\)".*/\1/p' | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "::error::Unable to resolve VERSION from backend/api/metrics/handler.go"
            exit 1
          fi

          case "$RELEASE_KIND" in
            pr-alpha)
              TAG_NAME="open-chat-pr-alpha-release-${VERSION}-${SHORT_SHA}"
              BRANCH_SLUG="$(printf '%s' "${SOURCE_BRANCH:-pr}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9.-]/-/g; s/-\+/-/g; s/\.\+/./g; s/^[.-]\+//; s/[.-]\+$//')"
              if [ -z "$BRANCH_SLUG" ]; then
                BRANCH_SLUG="pr"
              fi
              LATEST_TAG_NAME="open-chat-pr-alpha-release-${VERSION}-${BRANCH_SLUG}-latest"
              ;;
            staging)
              TAG_NAME="open-chat-staging-${VERSION}"
              LATEST_TAG_NAME=""
              ;;
            production)
              TAG_NAME="open-chat-${VERSION}"
              LATEST_TAG_NAME=""
              ;;
            *)
              echo "::error::Unsupported release_kind: ${RELEASE_KIND}"
              exit 1
              ;;
          esac

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "latest_tag_name=${LATEST_TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Resolve python client default branch SHA
        id: client_sha
        env:
          CLIENT_REPOSITORY: ${{ github.event.inputs.client_repository }}
        run: |
          set -euo pipefail
          repo_json="$(curl -fsSL \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CLIENT_REPOSITORY}")"
          default_branch="$(jq -r '.default_branch' <<< "$repo_json")"
          commit_json="$(curl -fsSL \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CLIENT_REPOSITORY}/commits/${default_branch}")"
          client_sha="$(jq -r '.sha' <<< "$commit_json")"
          echo "client_sha=${client_sha}" >> "$GITHUB_OUTPUT"

      - name: Create tag in python client repository
        id: create_tag
        env:
          CLIENT_REPOSITORY: ${{ github.event.inputs.client_repository }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          LATEST_TAG_NAME: ${{ steps.meta.outputs.latest_tag_name }}
          CLIENT_SHA: ${{ steps.client_sha.outputs.client_sha }}
        run: |
          set -euo pipefail
          create_or_update_tag() {
            local tag_name="$1"
            local lookup_file="$2"
            local write_file="$3"
            local status_code

            status_code="$(curl -s -o "$lookup_file" -w "%{http_code}" \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CLIENT_REPOSITORY}/git/ref/tags/${tag_name}")"

            if [ "$status_code" = "200" ]; then
              update_payload="$(jq -n --arg sha "$CLIENT_SHA" '{sha: $sha, force: true}')"
              update_status="$(curl -s -o "$write_file" -w "%{http_code}" -X PATCH \
                -H "Authorization: Bearer ${API_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${CLIENT_REPOSITORY}/git/refs/tags/${tag_name}" \
                -d "$update_payload")"
              [ "$update_status" = "200" ] && return 0
              echo "::error::Failed updating tag ${tag_name} (status ${update_status})."
              cat "$write_file" || true
              return 1
            fi

            if [ "$status_code" = "404" ]; then
              create_payload="$(jq -n --arg ref "refs/tags/${tag_name}" --arg sha "$CLIENT_SHA" '{ref: $ref, sha: $sha}')"
              create_status="$(curl -s -o "$write_file" -w "%{http_code}" -X POST \
                -H "Authorization: Bearer ${API_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${CLIENT_REPOSITORY}/git/refs" \
                -d "$create_payload")"
              [ "$create_status" = "201" ] && return 0
              if [ "$create_status" = "404" ]; then
                echo "::warning::Unable to create tag in ${CLIENT_REPOSITORY} (404). Token likely lacks write access to that repository; continuing without client tag."
                cat "$write_file" || true
                return 2
              fi
              echo "::error::Failed creating tag ${tag_name} (status ${create_status})."
              cat "$write_file" || true
              return 1
            fi

            echo "::error::Unexpected status checking tag ${tag_name}: ${status_code}"
            cat "$lookup_file" || true
            return 1
          }

          tag_created=true
          create_or_update_tag "$TAG_NAME" /tmp/client_tag_lookup.json /tmp/client_tag_write.json || rc=$?
          if [ "${rc:-0}" = "2" ]; then
            tag_created=false
          elif [ "${rc:-0}" != "0" ]; then
            exit 1
          fi

          latest_tag_created=false
          if [ "$tag_created" = "true" ] && [ -n "$LATEST_TAG_NAME" ]; then
            create_or_update_tag "$LATEST_TAG_NAME" /tmp/client_latest_tag_lookup.json /tmp/client_latest_tag_write.json || rc=$?
            if [ "${rc:-0}" = "2" ]; then
              latest_tag_created=false
            elif [ "${rc:-0}" != "0" ]; then
              exit 1
            else
              latest_tag_created=true
            fi
          fi

          echo "tag_created=$tag_created" >> "$GITHUB_OUTPUT"
          echo "latest_tag_created=$latest_tag_created" >> "$GITHUB_OUTPUT"

      - name: Comment installation instructions on source PR
        if: github.event.inputs.source_pr_number != ''
        env:
          SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
          SOURCE_PR_NUMBER: ${{ github.event.inputs.source_pr_number }}
          BOT_USER: ${{ github.event.inputs.bot_user }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          LATEST_TAG_NAME: ${{ steps.meta.outputs.latest_tag_name }}
          CLIENT_REPOSITORY: ${{ github.event.inputs.client_repository }}
          TAG_CREATED: ${{ steps.create_tag.outputs.tag_created }}
          LATEST_TAG_CREATED: ${{ steps.create_tag.outputs.latest_tag_created }}
        run: |
          set -euo pipefail
          if [ "$TAG_CREATED" = "true" ]; then
            if [ "$LATEST_TAG_CREATED" = "true" ] && [ -n "$LATEST_TAG_NAME" ]; then
              latest_install="\`pip install git+https://github.com/${CLIENT_REPOSITORY}.git@${LATEST_TAG_NAME}\`"
            else
              latest_install=""
            fi
            body="$(cat <<EOF
          Python client tag created: \`${TAG_NAME}\`

          \`pip install git+https://github.com/${CLIENT_REPOSITORY}.git@${TAG_NAME}\`
          ${latest_install}

          <!-- open-chat-python-client-tag -->
          EOF
          )"
          else
            body="$(cat <<EOF
          Python client release tag was skipped.

          - Repo: \`${CLIENT_REPOSITORY}\`
          - Intended tag: \`${TAG_NAME}\`
          - Reason: token could not create tags in that repository (missing cross-repo write access).

          <!-- open-chat-python-client-tag -->
          EOF
          )"
          fi
          payload="$(jq -n --arg body "$body" '{body: $body}')"

          comment_id="$({
            curl -fsSL \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${SOURCE_REPOSITORY}/issues/${SOURCE_PR_NUMBER}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-python-client-tag -->")))][0].id // ""'
          })"

          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${SOURCE_REPOSITORY}/issues/comments/${comment_id}" \
              -d "$payload" >/dev/null
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${SOURCE_REPOSITORY}/issues/${SOURCE_PR_NUMBER}/comments" \
              -d "$payload" >/dev/null
          fi
