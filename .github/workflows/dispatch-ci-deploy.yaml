name: Dispatch CI Deploy

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: Deployment name used by the CI deployment workflow
        required: true
        default: msgmate-io-staging
      target_ref:
        description: Target repository ref or SHA to deploy
        required: false
        default: main
      ci_repository:
        description: CI repository that contains the deploy workflow
        required: false
        default: ""
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read
  pull-requests: read

jobs:
  dispatch-ci-deploy:
    name: Dispatch CI Deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_PAT }}
      CI_REPOSITORY_INPUT: ${{ github.event.inputs.ci_repository }}
      CI_REPOSITORY_VAR: ${{ vars.CI_REPOSITORY }}
      CI_REF: ${{ vars.CI_REF || 'main' }}
      DEPLOYMENT_NAME_INPUT: ${{ github.event.inputs.deployment_name }}
      DEPLOYMENT_NAME_VAR: ${{ vars.CI_DEPLOYMENT_NAME }}
      TARGET_REF_INPUT: ${{ github.event.inputs.target_ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      EVENT_NAME: ${{ github.event_name }}
      EVENT_ACTION: ${{ github.event.action }}
      TARGET_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Dispatch deploy workflow
        run: |
          set -euo pipefail
          if [ -z "${CI_DISPATCH_TOKEN:-}" ]; then
            echo "Missing CI_DISPATCH_TOKEN or BOT_PAT secret."
            exit 1
          fi

          CI_REPOSITORY="${CI_REPOSITORY_INPUT:-${CI_REPOSITORY_VAR:-}}"
          if [ -z "$CI_REPOSITORY" ]; then
            echo "Missing CI repository. Set workflow input ci_repository or repository variable CI_REPOSITORY."
            exit 1
          fi

          DEPLOYMENT_NAME="${DEPLOYMENT_NAME_INPUT:-${DEPLOYMENT_NAME_VAR:-msgmate-io-staging}}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$EVENT_ACTION" = "closed" ]; then
              TARGET_REF="${PR_MERGE_SHA:-main}"
            else
              TARGET_REF="$PR_HEAD_SHA"
            fi
          else
            TARGET_REF="${TARGET_REF_INPUT:-main}"
          fi

          payload="$(
            jq -n \
              --arg ref "$CI_REF" \
              --arg deploymentName "$DEPLOYMENT_NAME" \
              --arg targetRepository "$TARGET_REPOSITORY" \
              --arg targetRef "$TARGET_REF" \
              '{
                ref: $ref,
                inputs: {
                  DEPLOYMENT_NAME: $deploymentName,
                  TARGET_REPOSITORY: $targetRepository,
                  TARGET_REF: $targetRef
                }
              }'
          )"

          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CI_REPOSITORY}/actions/workflows/test-api-deploy.yaml/dispatches" \
            -d "$payload"
