name: Run PR CI Tests and Deployments

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: Deployment name used by the CI deploy workflow
        required: false
        default: msgmate-io-staging
      target_ref:
        description: Target ref or SHA to deploy
        required: false
        default: main
      ci_repository:
        description: CI repository that contains the deploy workflow
        required: false
        default: msgmate-io/open-chat-go-ci
      BOT_USER:
        description: GitHub username that owns the bot comments
        required: false
        default: cur1ousdude
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

concurrency:
  group: pr-ci-${{ github.event.pull_request.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  deployments: write
  packages: write

env:
  CI_REPOSITORY_DEFAULT: msgmate-io/open-chat-go-ci
  CI_REF: ${{ vars.CI_REF || 'main' }}
  BOT_USER: ${{ github.event.inputs.BOT_USER || 'cur1ousdude' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  no_labels_guidance:
    name: Label Guidance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'deploy') && !contains(github.event.pull_request.labels.*.name, 'test')
    steps:
      - name: Delete previous workflow comments
        env:
          COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          comments="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '.[] | select(.user.login == $bot_user) | select((.body | contains("<!-- open-chat-pr-ci-progress -->")) or (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")) or (.body | contains("<!-- open-chat-ci-deploy-comment -->"))) | .id'
          )"
          for comment in $comments; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment}"
          done

      - name: Post no-label guidance comment
        env:
          COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Add labels to trigger CI actions:

            - `deploy`: trigger deployment dispatch to CI sub-repo
            - `test`: indicates API tests required for merge policy

            No label found, so I automatically added `test` for this PR.

            <!-- open-chat-pr-ci-no-label-guidance -->
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -d "$payload"
          fi

      - name: Add default test label
        env:
          LABEL_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${LABEL_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" \
            -d '{"labels":["test"]}'

  run-pr-ci-tests-and-deployments:
    name: Run PR CI Tests and Deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'deploy') || contains(github.event.pull_request.labels.*.name, 'test')
    outputs:
      ci_repository: ${{ steps.context.outputs.ci_repository }}
      deployment_name: ${{ steps.context.outputs.deployment_name }}
      target_ref: ${{ steps.context.outputs.target_ref }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      source_repository: ${{ steps.context.outputs.source_repository }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      should_test: ${{ steps.context.outputs.should_test }}
      image_url: ${{ steps.image.outputs.image_url }}
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_TOKEN || secrets.BOT_PAT }}
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
      CI_REPOSITORY_INPUT: ${{ github.event.inputs.ci_repository }}
      DEPLOYMENT_NAME_INPUT: ${{ github.event.inputs.deployment_name }}
      TARGET_REF_INPUT: ${{ github.event.inputs.target_ref }}
    steps:
      - name: Resolve context and label actions
        id: context
        run: |
          set -euo pipefail
          CI_REPOSITORY="${CI_REPOSITORY_INPUT:-$CI_REPOSITORY_DEFAULT}"
          DEPLOYMENT_NAME="${DEPLOYMENT_NAME_INPUT:-${{ vars.CI_DEPLOYMENT_NAME || 'msgmate-io-staging' }}}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_REF="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            SOURCE_REPOSITORY="${{ github.repository }}"
            SHOULD_DEPLOY="$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | grep -x 'deploy' || true)"
            SHOULD_TEST="$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | grep -x 'test' || true)"
          else
            TARGET_REF="${TARGET_REF_INPUT:-main}"
            PR_NUMBER=""
            SOURCE_REPOSITORY="${{ github.repository }}"
            SHOULD_DEPLOY="deploy"
            SHOULD_TEST=""
          fi
          echo "ci_repository=$CI_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "should_test=$SHOULD_TEST" >> "$GITHUB_OUTPUT"
          echo "Detected labels: deploy=${SHOULD_DEPLOY:-false} test=${SHOULD_TEST:-false}"

      - name: Delete previous workflow comments
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          comments="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '.[] | select(.user.login == $bot_user) | select((.body | contains("<!-- open-chat-pr-ci-progress -->")) or (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")) or (.body | contains("<!-- open-chat-ci-deploy-comment -->"))) | .id'
          )"
          for comment in $comments; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment}"
          done

      - name: Create initial progress comment
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && '- [ ] `(2) build` `running`' || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && '- [ ] `(3) deploy` `waiting for builds and approval`' || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [ ] `(4) test` `pending`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

      - name: Checkout source repository
        if: steps.context.outputs.should_deploy != '' || steps.context.outputs.should_test != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.target_ref }}
          token: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          submodules: recursive

      - name: Resolve build image metadata
        if: steps.context.outputs.should_deploy != ''
        id: image
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          IMAGE_REPO="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "${{ steps.context.outputs.pr_number }}" ]; then
            IMAGE_TAG="pr-${{ steps.context.outputs.pr_number }}-${SHORT_SHA}"
          else
            IMAGE_TAG="${{ steps.context.outputs.deployment_name }}-${SHORT_SHA}"
          fi
          IMAGE_URL="ghcr.io/${IMAGE_REPO}:${IMAGE_TAG}"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for temporary image push
        if: steps.context.outputs.should_deploy != ''
        run: |
          set -euo pipefail
          echo "${{ secrets.BOT_TOKEN || secrets.BOT_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push temporary deployment image
        if: steps.context.outputs.should_deploy != ''
        run: |
          set -euo pipefail
          cat > docker-compose.deploy.yaml <<EOF
          services:
            backend:
              image: ${{ steps.image.outputs.image_url }}
          EOF
          DOCKER_BUILDKIT=1 docker compose -f docker-compose.pro.yaml -f docker-compose.deploy.yaml build backend
          DOCKER_BUILDKIT=1 docker compose -f docker-compose.pro.yaml -f docker-compose.deploy.yaml push backend

      - name: Set up Go for tests
        if: steps.context.outputs.should_test != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        if: steps.context.outputs.should_test != ''
        working-directory: backend
        run: |
          set -euo pipefail
          go test ./...

      - name: Update progress comment after build
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && format('- [x] `(2) build` [`image={0}`]({1})', steps.image.outputs.image_url, format('https://github.com/{0}/pkgs/container/{1}', github.repository_owner, 'open-chat-go')) || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && '- [ ] `(3) deploy` `waiting for approval`' || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [ ] `(4) test` `pending`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

      - name: Skip deploy dispatch when deploy label is missing
        if: steps.context.outputs.should_deploy == ''
        run: echo "Deploy label not present; skipping deploy dispatch."

      - name: Update progress comment after dispatch
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && format('- [x] `(2) build` `image={0}`', steps.image.outputs.image_url) || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && '- [ ] `(3) deploy` `awaiting approval`' || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [x] `(4) test` `passed`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

  wait-for-deployment-approval:
    name: Wait for Admin Deployment Approval
    runs-on: ubuntu-latest
    needs: [run-pr-ci-tests-and-deployments]
    if: needs.run-pr-ci-tests-and-deployments.outputs.should_deploy != ''
    environment:
      name: pr-deployments
    steps:
      - name: Deployment approved
        run: |
          echo "Deployment approval granted for ${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}."

  approve-and-dispatch-deploy:
    name: Dispatch Approved Deploy
    runs-on: ubuntu-latest
    needs: [run-pr-ci-tests-and-deployments, wait-for-deployment-approval]
    if: needs.run-pr-ci-tests-and-deployments.outputs.should_deploy != ''
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_TOKEN || secrets.BOT_PAT }}
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
      CI_REF: ${{ vars.CI_REF || 'main' }}
      DISPATCH_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Create GitHub deployment
        id: deployment
        run: |
          set -euo pipefail
          deployment_json="$(curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/deployments" \
            -d "$(jq -n \
              --arg ref "${{ needs.run-pr-ci-tests-and-deployments.outputs.target_ref }}" \
              --arg env "${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}" \
              '{
                ref: $ref,
                environment: $env,
                auto_merge: false,
                required_contexts: []
              }')")"
          deployment_id="$(jq -r '.id' <<< "$deployment_json")"
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Mark deployment in progress
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
            -d "$(jq -n '{state:"in_progress", log_url:"'"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"'"}')"

      - name: Dispatch deployment workflow in CI repository
        run: |
          set -euo pipefail
          payload="$(
            jq -n \
              --arg ref "$CI_REF" \
              --arg deploymentName "${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}" \
              --arg targetRef "${{ needs.run-pr-ci-tests-and-deployments.outputs.target_ref }}" \
              --arg imageUrl "${{ needs.run-pr-ci-tests-and-deployments.outputs.image_url }}" \
              --arg sourceRepository "${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}" \
              --arg sourcePrNumber "${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}" \
              --arg botUser "$BOT_USER" \
              --arg dispatchRunId "$DISPATCH_RUN_ID" \
              '{
                ref: $ref,
                inputs: {
                  DEPLOYMENT_NAME: $deploymentName,
                  TARGET_REF: $targetRef,
                  BUILT_IMAGE_URL: $imageUrl,
                  SOURCE_REPOSITORY: $sourceRepository,
                  SOURCE_PR_NUMBER: $sourcePrNumber,
                  BOT_USER: $botUser,
                  DISPATCH_RUN_ID: $dispatchRunId
                }
              }'
          )"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.ci_repository }}/actions/workflows/test-api-deploy.yaml/dispatches" \
            -d "$payload"

      - name: Wait for dispatched CI deployment workflow
        id: wait_ci_deploy
        run: |
          set -euo pipefail
          expected_title="Deploy ${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }} ${DISPATCH_RUN_ID}"
          ci_repo="${{ needs.run-pr-ci-tests-and-deployments.outputs.ci_repository }}"
          run_id=""
          run_url=""

          for attempt in $(seq 1 80); do
            runs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${ci_repo}/actions/workflows/test-api-deploy.yaml/runs?event=workflow_dispatch&branch=${CI_REF}&per_page=20")"

            run_line="$(jq -r --arg title "$expected_title" '
              [
                .workflow_runs[]
                | select((.display_title // "") == $title)
                | [.id, .status, (.conclusion // ""), .html_url]
                | @tsv
              ][0] // ""
            ' <<< "$runs_json")"

            if [ -z "$run_line" ]; then
              echo "Attempt $attempt/80: waiting for dispatched CI workflow run '$expected_title' to appear."
              sleep 15
              continue
            fi

            IFS=$'\t' read -r run_id run_status run_conclusion run_url <<< "$run_line"
            echo "Attempt $attempt/80: CI run $run_id status=$run_status conclusion=${run_conclusion:-none}"

            if [ "$run_status" != "completed" ]; then
              sleep 15
              continue
            fi

            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
            if [ "$run_conclusion" = "success" ]; then
              exit 0
            fi

            echo "Dispatched CI deployment workflow failed with conclusion: $run_conclusion"
            exit 1
          done

          echo "Timed out waiting for dispatched CI deployment workflow."
          if [ -n "$run_url" ]; then
            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
          fi
          exit 1

      - name: Mark deployment success
        if: success() && steps.deployment.outputs.id != ''
        run: |
          set -euo pipefail
          log_url="${{ steps.wait_ci_deploy.outputs.ci_run_url }}"
          if [ -z "$log_url" ]; then
            log_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
            -d "$(jq -n --arg log_url "$log_url" '{state:"success", log_url:$log_url}')"

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id != ''
        run: |
          set -euo pipefail
          log_url="${{ steps.wait_ci_deploy.outputs.ci_run_url }}"
          if [ -z "$log_url" ]; then
            log_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses" \
            -d "$(jq -n --arg log_url "$log_url" '{state:"failure", log_url:$log_url}')"

      - name: Update progress comment after approved dispatch
        if: needs.run-pr-ci-tests-and-deployments.outputs.pr_number != ''
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.image_url != '' && format('- [x] `(2) build` `image={0}`', needs.run-pr-ci-tests-and-deployments.outputs.image_url) || '- [ ] ~~`(2) build` `skipped`~~' }}
            - [x] `(3) deploy` `dispatch triggered`
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.should_test != '' && '- [x] `(4) test` `passed`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              -d "$payload"
          fi
