name: Run PR CI Tests and Deployments

on:
  workflow_dispatch:
    inputs:
      deployment_name:
        description: Deployment name used by the CI deploy workflow
        required: false
        default: msgmate-io-staging
      target_ref:
        description: Target ref or SHA to deploy
        required: false
        default: main
      ci_repository:
        description: CI repository that contains the deploy workflow
        required: false
        default: msgmate-io/open-chat-go-ci
      BOT_USER:
        description: GitHub username that owns the bot comments
        required: false
        default: cur1ousdude
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - closed

concurrency:
  group: >-
    ${{ github.event_name == 'workflow_dispatch'
        && format('manual-deploy-{0}', github.run_id)
        || github.event.action == 'closed'
        && format('merged-deploy-{0}', github.event.pull_request.base.ref)
        || format('pr-ci-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  packages: write

env:
  CI_REPOSITORY_DEFAULT: msgmate-io/open-chat-go-ci
  CI_REF: ${{ vars.CI_REF || 'main' }}
  BOT_USER: ${{ github.event.inputs.BOT_USER || 'cur1ousdude' }}
  DEPLOYMENT_PR: msgmate-io-pr-deployment
  DEPLOYMENT_STAGING: msgmate-io-staging
  DEPLOYMENT_PRODUCTION: msgmate-io-production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  no_labels_guidance:
    name: Label Guidance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && !contains(github.event.pull_request.labels.*.name, 'deploy') && !contains(github.event.pull_request.labels.*.name, 'test')
    steps:
      - name: Delete previous workflow comments
        env:
          COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          comments="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '.[] | select(.user.login == $bot_user) | select((.body | contains("<!-- open-chat-pr-ci-progress -->")) or (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")) or (.body | contains("<!-- open-chat-ci-deploy-comment -->"))) | .id'
          )"
          for comment in $comments; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment}"
          done

      - name: Post no-label guidance comment
        env:
          COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Add labels to trigger CI actions:

            - `deploy`: trigger deployment dispatch to CI sub-repo
            - `test`: indicates API tests required for merge policy

            No label found, so I automatically added `test` for this PR.

            <!-- open-chat-pr-ci-no-label-guidance -->
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -d "$payload"
          fi

      - name: Add default test label
        env:
          LABEL_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${LABEL_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" \
            -d '{"labels":["test"]}'

  run-pr-ci-tests-and-deployments:
    name: Run PR CI Tests and Deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && (contains(github.event.pull_request.labels.*.name, 'deploy') || contains(github.event.pull_request.labels.*.name, 'test')))
    outputs:
      ci_repository: ${{ steps.context.outputs.ci_repository }}
      deployment_name: ${{ steps.context.outputs.deployment_name }}
      target_ref: ${{ steps.context.outputs.target_ref }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      source_repository: ${{ steps.context.outputs.source_repository }}
      pr_deploy_host: ${{ steps.context.outputs.pr_deploy_host }}
      pr_deploy_url: ${{ steps.context.outputs.pr_deploy_url }}
      pr_namespace: ${{ steps.context.outputs.pr_namespace }}
      pr_helm_release: ${{ steps.context.outputs.pr_helm_release }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      should_test: ${{ steps.context.outputs.should_test }}
      image_url: ${{ steps.image.outputs.image_url }}
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_TOKEN || secrets.BOT_PAT }}
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
      CI_REPOSITORY_INPUT: ${{ github.event.inputs.ci_repository }}
      DEPLOYMENT_NAME_INPUT: ${{ github.event.inputs.deployment_name }}
      TARGET_REF_INPUT: ${{ github.event.inputs.target_ref }}
    steps:
      - name: Cancel superseded workflow runs for this PR
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        env:
          CANCEL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          for status in in_progress queued; do
            runs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${CANCEL_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-pr-ci-tests-and-deployments.yaml/runs?status=${status}&per_page=30")"
            jq -r --arg current "$CURRENT_RUN_ID" --arg head_ref "$PR_HEAD_REF" \
              '.workflow_runs[]
              | select(.id != ($current | tonumber))
              | select(.head_branch == $head_ref)
              | .id' <<< "$runs_json" | while read -r run_id; do
              if [ -n "$run_id" ]; then
                echo "Cancelling superseded workflow run ${run_id} (${status})."
                curl -fsSL -X POST \
                  -H "Authorization: Bearer ${CANCEL_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}/cancel" \
                  >/dev/null || true
              fi
            done
          done

      - name: Resolve context and label actions
        id: context
        run: |
          set -euo pipefail
          CI_REPOSITORY="${CI_REPOSITORY_INPUT:-$CI_REPOSITORY_DEFAULT}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_REF="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            SOURCE_REPOSITORY="${{ github.repository }}"
            DEPLOYMENT_NAME="${{ env.DEPLOYMENT_PR }}"
            SHOULD_DEPLOY="$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | grep -x 'deploy' || true)"
            SHOULD_TEST="$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | grep -x 'test' || true)"
            RAW_PR_NAME="$(jq -r '.pull_request.head.ref // .pull_request.title // "pr"' "$GITHUB_EVENT_PATH")"
          else
            DEPLOYMENT_NAME="${DEPLOYMENT_NAME_INPUT:-${{ env.DEPLOYMENT_STAGING }}}"
            TARGET_REF="${TARGET_REF_INPUT:-main}"
            PR_NUMBER=""
            SOURCE_REPOSITORY="${{ github.repository }}"
            SHOULD_DEPLOY="deploy"
            SHOULD_TEST=""
            RAW_PR_NAME="$DEPLOYMENT_NAME"
          fi
          PR_SLUG="$(printf '%s' "$RAW_PR_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9.-]/-/g' \
            | sed 's/-\+/-/g; s/\.\+/./g' \
            | sed 's/^[.-]\+//; s/[.-]\+$//')"
          if [ -z "$PR_SLUG" ]; then
            PR_SLUG="pr"
          fi
          if ! printf '%s' "$PR_SLUG" | grep -q '^[a-z0-9]'; then
            PR_SLUG="p${PR_SLUG}"
          fi
          if ! printf '%s' "$PR_SLUG" | grep -q '[a-z0-9]$'; then
            PR_SLUG="${PR_SLUG}p"
          fi
          if [ -n "$PR_NUMBER" ]; then
            UNIQUE_SUFFIX="pr-${PR_NUMBER}"
            MAX_SLUG_LENGTH=$((63 - ${#UNIQUE_SUFFIX} - 1))
            if [ "$MAX_SLUG_LENGTH" -lt 1 ]; then
              MAX_SLUG_LENGTH=1
            fi
            PR_SLUG="$(printf '%s' "$PR_SLUG" | cut -c1-"$MAX_SLUG_LENGTH" | sed 's/[.-]\+$//')"
            if [ -z "$PR_SLUG" ]; then
              PR_SLUG="pr"
            fi
            PR_DEPLOY_HOST="${PR_SLUG}-${UNIQUE_SUFFIX}.pr-env.msgmate.io"
            PR_NAMESPACE="open-chat-pr-${PR_NUMBER}"
            PR_HELM_RELEASE="backend-pr-${PR_NUMBER}"
          else
            PR_DEPLOY_HOST=""
            PR_NAMESPACE=""
            PR_HELM_RELEASE=""
          fi
          echo "ci_repository=$CI_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "pr_deploy_host=$PR_DEPLOY_HOST" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_DEPLOY_HOST" ]; then
            echo "pr_deploy_url=https://$PR_DEPLOY_HOST" >> "$GITHUB_OUTPUT"
          else
            echo "pr_deploy_url=" >> "$GITHUB_OUTPUT"
          fi
          echo "pr_namespace=$PR_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "pr_helm_release=$PR_HELM_RELEASE" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "should_test=$SHOULD_TEST" >> "$GITHUB_OUTPUT"
          echo "Detected labels: deploy=${SHOULD_DEPLOY:-false} test=${SHOULD_TEST:-false}"

      - name: Delete previous workflow comments
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          comments="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '.[] | select(.user.login == $bot_user) | select((.body | contains("<!-- open-chat-pr-ci-progress -->")) or (.body | contains("<!-- open-chat-pr-ci-no-label-guidance -->")) or (.body | contains("<!-- open-chat-ci-deploy-comment -->"))) | .id'
          )"
          for comment in $comments; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment}"
          done

      - name: Create initial progress comment
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && '- [ ] `(2) build` `running`' || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && format('- [ ] `(3) deploy` [`url={0}`]({0}) [`approve here`]({1}) `waiting for builds and approval`', steps.context.outputs.pr_deploy_url, format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id)) || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [ ] `(4) test` `pending`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

      - name: Checkout source repository
        if: steps.context.outputs.should_deploy != '' || steps.context.outputs.should_test != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.target_ref }}
          token: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
          submodules: recursive

      - name: Resolve build image metadata
        if: steps.context.outputs.should_deploy != ''
        id: image
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          IMAGE_REPO="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "${{ steps.context.outputs.pr_number }}" ]; then
            IMAGE_TAG="pr-${{ steps.context.outputs.pr_number }}-${SHORT_SHA}"
          else
            IMAGE_TAG="${{ steps.context.outputs.deployment_name }}-${SHORT_SHA}"
          fi
          IMAGE_URL="ghcr.io/${IMAGE_REPO}:${IMAGE_TAG}"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for temporary image push
        if: steps.context.outputs.should_deploy != ''
        run: |
          set -euo pipefail
          echo "${{ secrets.BOT_TOKEN || secrets.BOT_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push temporary deployment image
        if: steps.context.outputs.should_deploy != ''
        run: |
          set -euo pipefail
          cat > docker-compose.deploy.yaml <<EOF
          services:
            backend:
              image: ${{ steps.image.outputs.image_url }}
          EOF
          DOCKER_BUILDKIT=1 docker compose -f docker-compose.pro.yaml -f docker-compose.deploy.yaml build backend
          DOCKER_BUILDKIT=1 docker compose -f docker-compose.pro.yaml -f docker-compose.deploy.yaml push backend

      - name: Set up Go for tests
        if: steps.context.outputs.should_test != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        if: steps.context.outputs.should_test != ''
        working-directory: backend
        run: |
          set -euo pipefail
          go test ./...

      - name: Update progress comment after build
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && format('- [x] `(2) build` [`image={0}`]({1})', steps.image.outputs.image_url, format('https://github.com/{0}/pkgs/container/{1}', github.repository_owner, 'open-chat-go')) || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && format('- [ ] `(3) deploy` [`url={0}`]({0}) [`approve here`]({1}) `waiting for approval`', steps.context.outputs.pr_deploy_url, format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id)) || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [ ] `(4) test` `pending`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

      - name: Skip deploy dispatch when deploy label is missing
        if: steps.context.outputs.should_deploy == ''
        run: echo "Deploy label not present; skipping deploy dispatch."

      - name: Update progress comment after dispatch
        if: github.event_name == 'pull_request'
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ steps.context.outputs.should_deploy != '' && format('- [x] `(2) build` `image={0}`', steps.image.outputs.image_url) || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ steps.context.outputs.should_deploy != '' && format('- [ ] `(3) deploy` [`url={0}`]({0}) [`approve here`]({1}) `awaiting approval`', steps.context.outputs.pr_deploy_url, format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id)) || '- [ ] ~~`(3) deploy` `skipped`~~' }}
            ${{ steps.context.outputs.should_test != '' && '- [x] `(4) test` `passed`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

  pr-test-merge-requirement:
    name: PR Test Merge Requirement
    runs-on: ubuntu-latest
    needs: [run-pr-ci-tests-and-deployments]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    steps:
      - name: Enforce test label and passing tests
        run: |
          set -euo pipefail
          if ! jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | grep -qx 'test'; then
            echo "::error::PR is missing the required 'test' label."
            exit 1
          fi
          case "${{ needs.run-pr-ci-tests-and-deployments.result }}" in
            success) ;;
            skipped)
              echo "::error::PR CI did not run for this commit with the test label."
              exit 1
              ;;
            failure)
              echo "::error::PR CI tests failed."
              exit 1
              ;;
            cancelled)
              echo "::error::PR CI was cancelled."
              exit 1
              ;;
            *)
              echo "::error::PR CI ended with unexpected result: ${{ needs.run-pr-ci-tests-and-deployments.result }}"
              exit 1
              ;;
          esac
          if [ -z "${{ needs.run-pr-ci-tests-and-deployments.outputs.should_test }}" ]; then
            echo "::error::Tests were not executed despite the test label."
            exit 1
          fi
          echo "PR test merge requirement satisfied."

  post-deploy-approval-link:
    name: Post Deploy Approval Link
    runs-on: ubuntu-latest
    needs: [run-pr-ci-tests-and-deployments]
    if: github.event_name == 'pull_request' && needs.run-pr-ci-tests-and-deployments.outputs.should_deploy != ''
    env:
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
    steps:
      - name: Update progress comment when approval gate opens
        env:
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.image_url != '' && format('- [x] `(2) build` `image={0}`', needs.run-pr-ci-tests-and-deployments.outputs.image_url) || '- [ ] ~~`(2) build` `skipped`~~' }}
            ${{ format('- [ ] `(3) deploy` [`url={0}`]({0}) [`approve here`]({1}) `awaiting approval`', needs.run-pr-ci-tests-and-deployments.outputs.pr_deploy_url, format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id)) }}
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.should_test != '' && '- [x] `(4) test` `passed`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

  approve-and-dispatch-deploy:
    name: Dispatch Approved Deploy
    runs-on: ubuntu-latest
    needs: [run-pr-ci-tests-and-deployments, post-deploy-approval-link]
    if: |
      always() &&
      needs.run-pr-ci-tests-and-deployments.result == 'success' &&
      needs.run-pr-ci-tests-and-deployments.outputs.should_deploy != '' &&
      (needs.post-deploy-approval-link.result == 'success' || needs.post-deploy-approval-link.result == 'skipped')
    concurrency:
      group: pr-deploy-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    environment:
      name: ${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_TOKEN || secrets.BOT_PAT }}
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
      CI_REF: ${{ vars.CI_REF || 'main' }}
      DISPATCH_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Cancel superseded CI deployment runs for this PR
        env:
          CI_REPO: ${{ needs.run-pr-ci-tests-and-deployments.outputs.ci_repository }}
          PR_NUMBER: ${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}
        run: |
          set -euo pipefail
          for status in in_progress queued; do
            runs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CI_REPO}/actions/workflows/test-api-deploy.yaml/runs?status=${status}&per_page=30")"
            jq -r --arg pr "$PR_NUMBER" \
              '.workflow_runs[]
              | select((.display_title // "") | contains("PR#" + $pr))
              | .id' <<< "$runs_json" | while read -r run_id; do
              if [ -n "$run_id" ]; then
                echo "Cancelling superseded CI deployment run ${run_id} (${status})."
                curl -fsSL -X POST \
                  -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/${CI_REPO}/actions/runs/${run_id}/cancel" \
                  >/dev/null || true
              fi
            done
          done

      - name: Dispatch deployment workflow in CI repository
        run: |
          set -euo pipefail
          payload="$(
            jq -n \
              --arg ref "$CI_REF" \
              --arg deploymentName "${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}" \
              --arg targetRef "${{ needs.run-pr-ci-tests-and-deployments.outputs.target_ref }}" \
              --arg imageUrl "${{ needs.run-pr-ci-tests-and-deployments.outputs.image_url }}" \
              --arg sourceRepository "${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}" \
              --arg sourcePrNumber "${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}" \
              --arg deployHost "${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_deploy_host }}" \
              --arg namespace "${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_namespace }}" \
              --arg helmRelease "${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_helm_release }}" \
              --arg botUser "$BOT_USER" \
              --arg dispatchRunId "$DISPATCH_RUN_ID" \
              '{
                ref: $ref,
                inputs: {
                  DEPLOYMENT_NAME: $deploymentName,
                  TARGET_REF: $targetRef,
                  BUILT_IMAGE_URL: $imageUrl,
                  SOURCE_REPOSITORY: $sourceRepository,
                  SOURCE_PR_NUMBER: $sourcePrNumber,
                  DEPLOY_HOST_OVERRIDE: $deployHost,
                  NAMESPACE_OVERRIDE: $namespace,
                  HELM_RELEASE_OVERRIDE: $helmRelease,
                  BOT_USER: $botUser,
                  DISPATCH_RUN_ID: $dispatchRunId
                }
              }'
          )"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.ci_repository }}/actions/workflows/test-api-deploy.yaml/dispatches" \
            -d "$payload"

      - name: Wait for dispatched CI deployment workflow
        id: wait_ci_deploy
        timeout-minutes: 6
        env:
          DEPLOYMENT_NAME: ${{ needs.run-pr-ci-tests-and-deployments.outputs.deployment_name }}
          PR_NUMBER: ${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}
        run: |
          set -euo pipefail
          trap 'echo "::notice::Cancelled — exiting CI wait loop."; exit 130' INT TERM

          interruptible_sleep() {
            local remaining="$1"
            while [ "$remaining" -gt 0 ]; do
              sleep 1
              remaining=$((remaining - 1))
            done
          }

          github_api_get() {
            curl -fsSL --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          ci_repo="${{ needs.run-pr-ci-tests-and-deployments.outputs.ci_repository }}"
          run_id=""
          run_url=""

          for attempt in $(seq 1 20); do
            runs_json="$(github_api_get "https://api.github.com/repos/${ci_repo}/actions/workflows/test-api-deploy.yaml/runs?event=workflow_dispatch&per_page=30")"

            run_line="$(jq -r --arg dispatch_id "$DISPATCH_RUN_ID" --arg deployment "$DEPLOYMENT_NAME" --arg pr "$PR_NUMBER" '
              def candidates:
                [.workflow_runs[]
                | select((.display_title // "") | endswith($dispatch_id))
                | select((.display_title // "") | startswith("Deploy " + $deployment))];
              (if $pr != "" then
                [candidates[] | select((.display_title // "") | contains("PR#" + $pr))][0]
                // candidates[0]
              else
                [candidates[] | select((.display_title // "") | contains("PR#") | not)][0]
                // candidates[0]
              end)
              | if . == null then "" else [.id, .status, (.conclusion // ""), .html_url] | @tsv end
            ' <<< "$runs_json")"

            if [ -z "$run_line" ]; then
              echo "Attempt $attempt/20: waiting for CI workflow run ending with '${DISPATCH_RUN_ID}' (Deploy ${DEPLOYMENT_NAME}...)."
              interruptible_sleep 15
              continue
            fi

            IFS=$'\t' read -r run_id run_status run_conclusion run_url <<< "$run_line"
            echo "Attempt $attempt/20: CI run $run_id status=$run_status conclusion=${run_conclusion:-none}"

            if [ "$run_status" != "completed" ]; then
              interruptible_sleep 15
              continue
            fi

            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
            if [ "$run_conclusion" = "success" ]; then
              exit 0
            fi

            echo "Dispatched CI deployment workflow failed with conclusion: $run_conclusion"
            exit 1
          done

          echo "Timed out waiting for dispatched CI deployment workflow."
          if [ -n "$run_url" ]; then
            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
          fi
          exit 1

      - name: Update progress comment after approved dispatch
        if: needs.run-pr-ci-tests-and-deployments.outputs.pr_number != ''
        env:
          COMMENT_TOKEN: ${{ env.COMMENT_TOKEN }}
          BOT_USER: ${{ env.BOT_USER }}
        run: |
          set -euo pipefail
          body="$(cat <<'EOF'
            Running PR CI orchestration.

            <!-- open-chat-pr-ci-progress -->

            - [x] `(1) setup` [`run`](${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }})
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.image_url != '' && format('- [x] `(2) build` `image={0}`', needs.run-pr-ci-tests-and-deployments.outputs.image_url) || '- [ ] ~~`(2) build` `skipped`~~' }}
            - [x] `(3) deploy` [`url=${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_deploy_url }}`](${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_deploy_url }})
            ${{ needs.run-pr-ci-tests-and-deployments.outputs.should_test != '' && '- [x] `(4) test` `passed`' || '- [ ] ~~`(4) test` `skipped`~~' }}
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-pr-ci-progress -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ needs.run-pr-ci-tests-and-deployments.outputs.source_repository }}/issues/${{ needs.run-pr-ci-tests-and-deployments.outputs.pr_number }}/comments" \
              -d "$payload"
          fi

  resolve-merged-deployment:
    name: Resolve Merged Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'production')
    outputs:
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      deployment_name: ${{ steps.context.outputs.deployment_name }}
      target_ref: ${{ steps.context.outputs.target_ref }}
      ci_repository: ${{ steps.context.outputs.ci_repository }}
      deployment_url: ${{ steps.context.outputs.deployment_url }}
      merge_target: ${{ steps.context.outputs.merge_target }}
      helm_values_file: ${{ steps.context.outputs.helm_values_file }}
    steps:
      - name: Resolve merged deployment context
        id: context
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          TARGET_REF="${{ github.event.pull_request.merge_commit_sha }}"
          if [ -z "$TARGET_REF" ] || [ "$TARGET_REF" = "null" ]; then
            TARGET_REF="$BASE_REF"
          fi

          if [ "$BASE_REF" = "production" ]; then
            DEPLOYMENT_NAME="${{ env.DEPLOYMENT_PRODUCTION }}"
            DEPLOYMENT_URL="https://msgmate.io"
            HELM_VALUES_FILE="development/helm/backend/values.${{ env.DEPLOYMENT_PRODUCTION }}.yaml"
          else
            DEPLOYMENT_NAME="${{ env.DEPLOYMENT_STAGING }}"
            DEPLOYMENT_URL="https://stage.msgmate.io"
            HELM_VALUES_FILE="development/helm/backend/values.${{ env.DEPLOYMENT_STAGING }}.yaml"
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "ci_repository=$CI_REPOSITORY_DEFAULT" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "merge_target=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "helm_values_file=$HELM_VALUES_FILE" >> "$GITHUB_OUTPUT"

  open-production-promotion-pr:
    name: Open Production Promotion PR
    runs-on: ubuntu-latest
    needs: [resolve-merged-deployment]
    if: |
      needs.resolve-merged-deployment.outputs.should_deploy == 'true' &&
      needs.resolve-merged-deployment.outputs.merge_target == 'main'
    env:
      PR_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
      REPOSITORY: ${{ github.repository }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Open or refresh main to production promotion PR
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_PR_TITLE: ${{ github.event.pull_request.title }}
          MERGED_PR_URL: ${{ github.event.pull_request.html_url }}
          PROMOTED_SHA: ${{ needs.resolve-merged-deployment.outputs.target_ref }}
          STAGING_DEPLOY_URL: ${{ needs.resolve-merged-deployment.outputs.deployment_url }}
        run: |
          set -euo pipefail
          compare_json="$(curl -fsSL \
            -H "Authorization: Bearer ${PR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/compare/production...main")"
          ahead_by="$(jq -r '.ahead_by // 0' <<< "$compare_json")"
          if [ "$ahead_by" = "0" ]; then
            echo "main is not ahead of production; skipping production promotion PR."
            exit 0
          fi

          title="[Production deploy] Promote main → production — merging updates msgmate.io"
          body="$(cat <<EOF
          <!-- open-chat-production-promotion -->

          This pull request was opened automatically after a merge to \`main\`.

          **Merging this PR will trigger a production deployment to [msgmate.io](https://msgmate.io).**
          Deployment requires admin approval in the \`${{ env.DEPLOYMENT_PRODUCTION }}\` environment.

          | | |
          | --- | --- |
          | Helm values | \`development/helm/backend/values.${{ env.DEPLOYMENT_PRODUCTION }}.yaml\` |
          | Deployment environment | \`${{ env.DEPLOYMENT_PRODUCTION }}\` |
          | Staging preview | [${STAGING_DEPLOY_URL}](${STAGING_DEPLOY_URL}) |
          | Promoted commit | \`${PROMOTED_SHA}\` |
          | Source merge | [#${MERGED_PR_NUMBER}](${MERGED_PR_URL}) — ${MERGED_PR_TITLE} |

          The \`test\` label is required before merge. CI must pass via **PR Test Merge Requirement**.
          EOF
          )"

          existing_pr_number="$(
            curl -fsSL \
              -H "Authorization: Bearer ${PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pulls?state=open&head=${REPO_OWNER}:main&base=production&per_page=1" \
              | jq -r '.[0].number // ""'
          )"

          if [ -n "$existing_pr_number" ]; then
            echo "Closing stale production promotion PR #${existing_pr_number} before opening a fresh one."
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pulls/${existing_pr_number}" \
              -d '{"state":"closed"}'
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/issues/${existing_pr_number}/comments" \
              -d "$(jq -n --arg body 'Superseded by a newer merge to `main`. A fresh production promotion PR is being opened.' '{body: $body}')"
          fi

          echo "Creating production promotion PR from main to production."
          pr_number="$(
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pulls" \
              -d "$(jq -n \
                --arg title "$title" \
                --arg body "$body" \
                --arg head "main" \
                --arg base "production" \
                '{title: $title, body: $body, head: $head, base: $base}')" \
              | jq -r '.number'
          )"

          curl -fsSL -X POST \
            -H "Authorization: Bearer ${PR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${pr_number}/labels" \
            -d '{"labels":["test"]}'

          echo "Production promotion PR: ${GITHUB_SERVER_URL}/${REPOSITORY}/pull/${pr_number}"

  post-merged-deploy-approval-link:
    name: Post Merged Deploy Approval Link
    runs-on: ubuntu-latest
    needs: [resolve-merged-deployment]
    if: needs.resolve-merged-deployment.outputs.should_deploy == 'true'
    env:
      COMMENT_TOKEN: ${{ secrets.BOT_TOKEN || secrets.BOT_PAT || github.token }}
    steps:
      - name: Comment deployment approval link on merged PR
        env:
          BOT_USER: ${{ env.BOT_USER }}
          DEPLOYMENT_NAME: ${{ needs.resolve-merged-deployment.outputs.deployment_name }}
          DEPLOYMENT_URL: ${{ needs.resolve-merged-deployment.outputs.deployment_url }}
          HELM_VALUES_FILE: ${{ needs.resolve-merged-deployment.outputs.helm_values_file }}
          APPROVAL_RUN_URL: ${{ format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          body="$(cat <<EOF
          Merged deployment queued for **${DEPLOYMENT_NAME}** → [${DEPLOYMENT_URL}](${DEPLOYMENT_URL}).

          - Helm values: \`${HELM_VALUES_FILE}\`
          - Deployment environment: \`${DEPLOYMENT_NAME}\`
          - [Approve deployment here](${APPROVAL_RUN_URL})

          <!-- open-chat-merged-deploy-comment -->
          EOF
          )"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          comment_id="$(
            curl -fsSL \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${MERGED_PR_NUMBER}/comments" \
              | jq -r --arg bot_user "$BOT_USER" '[.[] | select(.user.login == $bot_user and (.body | contains("<!-- open-chat-merged-deploy-comment -->")))][0].id // ""'
          )"
          if [ -n "$comment_id" ]; then
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -d "$payload"
          else
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COMMENT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${MERGED_PR_NUMBER}/comments" \
              -d "$payload"
          fi

  dispatch-merged-deployment:
    name: Dispatch Merged Deployment
    runs-on: ubuntu-latest
    needs: [resolve-merged-deployment, post-merged-deploy-approval-link]
    if: |
      always() &&
      needs.resolve-merged-deployment.outputs.should_deploy == 'true' &&
      (needs.post-merged-deploy-approval-link.result == 'success' || needs.post-merged-deploy-approval-link.result == 'skipped')
    concurrency:
      group: merged-deploy-dispatch-${{ github.event.pull_request.base.ref }}
      cancel-in-progress: true
    environment:
      name: ${{ needs.resolve-merged-deployment.outputs.deployment_name }}
    env:
      CI_DISPATCH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN || secrets.BOT_TOKEN || secrets.BOT_PAT }}
      CI_REF: ${{ vars.CI_REF || 'main' }}
      DISPATCH_RUN_ID: merged-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Cancel superseded CI deployment runs for this branch
        env:
          CI_REPO: ${{ needs.resolve-merged-deployment.outputs.ci_repository }}
          DEPLOYMENT_NAME: ${{ needs.resolve-merged-deployment.outputs.deployment_name }}
        run: |
          set -euo pipefail
          for status in in_progress queued; do
            runs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CI_REPO}/actions/workflows/test-api-deploy.yaml/runs?status=${status}&per_page=30")"
            jq -r --arg deployment "$DEPLOYMENT_NAME" \
              '.workflow_runs[]
              | select((.display_title // "") | startswith("Deploy " + $deployment))
              | select((.display_title // "") | contains("PR#") | not)
              | .id' <<< "$runs_json" | while read -r run_id; do
              if [ -n "$run_id" ]; then
                echo "Cancelling superseded CI deployment run ${run_id} (${status})."
                curl -fsSL -X POST \
                  -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/${CI_REPO}/actions/runs/${run_id}/cancel" \
                  >/dev/null || true
              fi
            done
          done

      - name: Dispatch deployment workflow in CI repository
        run: |
          set -euo pipefail
          payload="$(
            jq -n \
              --arg ref "$CI_REF" \
              --arg deploymentName "${{ needs.resolve-merged-deployment.outputs.deployment_name }}" \
              --arg targetRef "${{ needs.resolve-merged-deployment.outputs.target_ref }}" \
              --arg sourceRepository "${{ github.repository }}" \
              --arg sourcePrNumber "${{ github.event.pull_request.number }}" \
              --arg botUser "$BOT_USER" \
              --arg dispatchRunId "$DISPATCH_RUN_ID" \
              '{
                ref: $ref,
                inputs: {
                  DEPLOYMENT_NAME: $deploymentName,
                  TARGET_REF: $targetRef,
                  SOURCE_REPOSITORY: $sourceRepository,
                  SOURCE_PR_NUMBER: $sourcePrNumber,
                  BOT_USER: $botUser,
                  DISPATCH_RUN_ID: $dispatchRunId
                }
              }'
          )"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.resolve-merged-deployment.outputs.ci_repository }}/actions/workflows/test-api-deploy.yaml/dispatches" \
            -d "$payload"

      - name: Wait for dispatched CI deployment workflow
        id: wait_ci_deploy
        timeout-minutes: 6
        env:
          DEPLOYMENT_NAME: ${{ needs.resolve-merged-deployment.outputs.deployment_name }}
        run: |
          set -euo pipefail
          trap 'echo "::notice::Cancelled — exiting CI wait loop."; exit 130' INT TERM

          interruptible_sleep() {
            local remaining="$1"
            while [ "$remaining" -gt 0 ]; do
              sleep 1
              remaining=$((remaining - 1))
            done
          }

          github_api_get() {
            curl -fsSL --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${CI_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          ci_repo="${{ needs.resolve-merged-deployment.outputs.ci_repository }}"
          run_url=""

          for attempt in $(seq 1 20); do
            runs_json="$(github_api_get "https://api.github.com/repos/${ci_repo}/actions/workflows/test-api-deploy.yaml/runs?event=workflow_dispatch&per_page=30")"

            run_line="$(jq -r --arg dispatch_id "$DISPATCH_RUN_ID" --arg deployment "$DEPLOYMENT_NAME" '
              [
                .workflow_runs[]
                | select((.display_title // "") | endswith($dispatch_id))
                | select((.display_title // "") | startswith("Deploy " + $deployment))
                | select((.display_title // "") | contains("PR#") | not)
                | [.status, (.conclusion // ""), .html_url]
                | @tsv
              ][0] // ""
            ' <<< "$runs_json")"

            if [ -z "$run_line" ]; then
              echo "Attempt $attempt/20: waiting for CI workflow run ending with '${DISPATCH_RUN_ID}' (Deploy ${DEPLOYMENT_NAME}...)."
              interruptible_sleep 15
              continue
            fi

            IFS=$'\t' read -r run_status run_conclusion run_url <<< "$run_line"
            echo "Attempt $attempt/20: CI status=$run_status conclusion=${run_conclusion:-none}"
            if [ "$run_status" != "completed" ]; then
              interruptible_sleep 15
              continue
            fi

            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
            if [ "$run_conclusion" = "success" ]; then
              exit 0
            fi
            echo "Dispatched CI deployment workflow failed with conclusion: $run_conclusion"
            exit 1
          done

          echo "Timed out waiting for dispatched CI deployment workflow."
          if [ -n "$run_url" ]; then
            echo "ci_run_url=$run_url" >> "$GITHUB_OUTPUT"
          fi
          exit 1
