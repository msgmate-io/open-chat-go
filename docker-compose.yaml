services:
  backend:
    build:
      dockerfile: dev.dockerfile
      context: .
    image: dev-backend
    depends_on:
      - frontend
      - storybook
    ports:
      - "1984:1984"
    volumes:
      - ./backend:/backend
    environment:
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_PROXY: "http://frontend:3000"
      # Dev-only: proxy Storybook under /storybook/ (see storybook service).
      STORYBOOK_FRONTEND_PROXY: "http://storybook:6006"
      ROOT_CREDENTIALS: "admin:password"
      HOST: "0.0.0.0"
      PORT: 1984
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
  frontend:
    build:
      dockerfile: dev.dockerfile
      context: ./frontend/
    image: dev-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
  storybook:
    image: dev-frontend
    build:
      dockerfile: dev.dockerfile
      context: ./frontend/
    command: sh -c "npm install | cat && npm run storybook --workspace=@open-chat-go/ui -- --host 0.0.0.0 --no-open --ci | cat"
    environment:
      # Hosted under /storybook so Vite assets don't collide with the app frontend.
      STORYBOOK_BASE_PATH: storybook
      STORYBOOK_DISABLE_VITEST: "1"
    ports:
      - "6006:6006"
    volumes:
      - ./frontend:/frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
