services:
  backend:
    build:
      dockerfile: dev.dockerfile
      context: .
    image: dev-backend
    depends_on:
      frontend:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "1984:1984"
    volumes:
      - ./backend:/backend
    environment:
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_PROXY: "http://frontend:3000"
      # Dev-only: proxy Storybook under /storybook/ (see storybook service).
      STORYBOOK_FRONTEND_PROXY: "http://storybook:6006"
      ROOT_CREDENTIALS: "admin:password"
      HOST: "0.0.0.0"
      PORT: 1984
      REDIS_URL: "redis://redis:6379/0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
  frontend:
    build:
      dockerfile: dev.dockerfile
      context: ./frontend/
    image: dev-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
  storybook:
    profiles: [ "storybook" ]
    image: dev-frontend
    build:
      dockerfile: dev.dockerfile
      context: ./frontend/
    command: sh -c "npm install | cat && npm run storybook --workspace=@open-chat-go/ui -- --host 0.0.0.0 --no-open --ci | cat"
    environment:
      # Hosted under /storybook so Vite assets don't collide with the app frontend.
      STORYBOOK_BASE_PATH: storybook
      STORYBOOK_DISABLE_VITEST: "1"
    ports:
      - "6006:6006"
    volumes:
      - ./frontend:/frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
